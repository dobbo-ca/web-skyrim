name: Deploy to dobbo.ca/skyrim

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: skyrim-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Mint GitHub App token (dobbobot-public)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_PUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_PUB_APP_PEM }}
          owner: dobbo-ca
          repositories: dobbo-ca.github.io

      - name: Checkout Pages repo
        uses: actions/checkout@v4
        with:
          repository: dobbo-ca/dobbo-ca.github.io
          token: ${{ steps.app-token.outputs.token }}
          path: pages
          fetch-depth: 1

      - name: Sync build into skyrim/
        run: |
          rm -rf pages/skyrim
          mkdir -p pages/skyrim
          cp -r dist/. pages/skyrim/

      - name: Commit and push
        working-directory: pages
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "dobbobot-public[bot]"
          git config user.email "dobbobot-public[bot]@users.noreply.github.com"
          git add skyrim
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git commit -m "deploy: skyrim @ ${GITHUB_SHA::7}"
          git push
</content>
