name: Deploy to dobbo.ca/skyrim/alchemy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: skyrim-alchemy-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Checkout Pages repo
        uses: actions/checkout@v4
        with:
          repository: cdobbyn/cdobbyn.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: pages
          fetch-depth: 1

      - name: Sync build into skyrim/alchemy/
        run: |
          rm -rf pages/skyrim/alchemy
          mkdir -p pages/skyrim/alchemy
          cp -r dist/. pages/skyrim/alchemy/

      - name: Commit and push
        working-directory: pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skyrim/alchemy
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git commit -m "deploy: skyrim-alchemy @ ${GITHUB_SHA::7}"
          git push
